{% extends 'resident_base.html' %}

{% block title %}Add Visitor | eSociety{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex items-center gap-3">
        <a href="{% url 'my_visitors' %}" class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface active:scale-95 transition-all">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div>
            <h2 class="text-2xl font-extrabold text-on-surface tracking-tight">Add Visitor</h2>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-surface-container-lowest p-6 rounded-3xl shadow-[0_10px_30px_rgba(0,0,0,0.03)] border border-outline-variant/10">
        <div class="mb-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/10 text-primary rounded-xl flex items-center justify-center">
                <span class="material-symbols-outlined">person_add</span>
            </div>
            <p class="text-sm text-on-surface-variant">Pre-approve a guest for quick gate entry.</p>
        </div>
        
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1.5">
                <label class="text-sm font-bold text-on-surface tracking-wide">Full Name <span class="text-error">*</span></label>
                <input type="text" name="name" required class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-shadow" placeholder="e.g. Rahul Sharma">
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-bold text-on-surface tracking-wide">Phone Number <span class="text-error">*</span></label>
                <input type="tel" name="phone" required class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-shadow" placeholder="e.g. +91 98765 43210">
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-bold text-on-surface tracking-wide">Purpose of Visit <span class="text-error">*</span></label>
                <div class="relative">
                    <select name="purpose" required class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface appearance-none focus:ring-2 focus:ring-primary/50 transition-shadow">
                        <option value="" disabled selected>Select purpose…</option>
                        <option value="Guest">Guest / Family</option>
                        <option value="Delivery">Delivery</option>
                        <option value="Maintenance">Maintenance / Repair</option>
                        <option value="Other">Other</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-bold text-on-surface tracking-wide flex justify-between">
                    <span>Vehicle Number</span>
                    <span class="text-outline text-xs font-medium">Optional</span>
                </label>
                <input type="text" name="vehicle_number" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-shadow uppercase" placeholder="e.g. MH12XY5678">
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">how_to_reg</span>
                    Pre-Approve Visitor
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
