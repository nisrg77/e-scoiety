<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | eSociety Management</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --primary-dark: #3730A3;
            --secondary: #10B981;
            --background: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #4F46E5 50%, #3730A3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: blobFloat 8s ease-in-out infinite alternate;
        }
        body::before {
            width: 400px; height: 400px;
            background: #818CF8;
            top: -100px; left: -100px;
        }
        body::after {
            width: 300px; height: 300px;
            background: #10B981;
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }

        @keyframes blobFloat {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.1); }
        }

        /* Card */
        .auth-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255,255,255,0.3);
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            animation: cardSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo/Brand */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }

        .brand-text h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        .brand-text p {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Headings */
        .auth-heading {
            margin-bottom: 28px;
        }

        .auth-heading h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .auth-heading p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Form controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #9CA3AF;
            font-size: 20px;
            transition: var(--transition);
        }

        .form-control {
            width: 100%;
            height: 52px;
            background: #F9FAFB;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0 16px 0 48px;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .form-control:focus {
            background: white;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        .form-control:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            height: 52px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }

        .auth-alert {
            background: #FEF2F2;
            border: 1px solid #FCA5A5;
            color: #DC2626;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

    </style>
</head>
<body>

    <div class="auth-card">
        
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <span class="material-icons-round">apartment</span>
            </div>
            <div class="brand-text">
                <h1>eSociety</h1>
                <p>Management System</p>
            </div>
        </div>

        <!-- Heading -->
        <div class="auth-heading">
            <h2>New Password</h2>
            <p>Enter your new password below.</p>
        </div>

        {% if error %}
        <div class="auth-alert">
            <span class="material-icons-round" style="font-size: 18px;">error_outline</span>
            {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="{% url 'reset_password' %}" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label for="id_password">New Password</label>
                <div class="input-wrapper">
                    <span class="material-icons-round input-icon">lock_outline</span>
                    <input
                        type="password"
                        id="id_password"
                        name="password"
                        class="form-control"
                        placeholder="New password"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="id_confirm_password">Confirm New Password</label>
                <div class="input-wrapper">
                    <span class="material-icons-round input-icon">lock_outline</span>
                    <input
                        type="password"
                        id="id_confirm_password"
                        name="confirm_password"
                        class="form-control"
                        placeholder="Confirm new password"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="material-icons-round" style="font-size: 20px;">save</span>
                Reset Password
            </button>
        </form>

    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="material-icons-round" style="font-size:20px; animation: spin 0.8s linear infinite;">refresh</span> Saving...';
            btn.style.opacity = '0.85';
        });
    </script>
</body>
</html>
